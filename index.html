<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Zuki</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e0e;
      --surface: #161616;
      --border: #2a2a2a;
      --text: #e8e8e8;
      --muted: #767676;
      --accent: #c8c8c8;
      --accent-dim: #6a6a6a;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 300;
      font-size: 18px;
      line-height: 1.8;
      min-height: 100vh;
      padding: 0 1.5rem;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='8.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.06'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    .wrap {
      position: relative;
      z-index: 1;
      max-width: 680px;
      margin: 0 auto;
      padding: 6rem 0 8rem;
    }

    .fade { animation: fadeUp 0.7s ease both; }
    .d1  { animation-delay: 0.1s; }
    .d2  { animation-delay: 0.2s; }
    .d3  { animation-delay: 0.3s; }
    .d4  { animation-delay: 0.4s; }
    .d5  { animation-delay: 0.5s; }
    .d6  { animation-delay: 0.6s; }
    .d7  { animation-delay: 0.7s; }
    .d8  { animation-delay: 0.8s; }
    .d9  { animation-delay: 0.9s; }
    .d10 { animation-delay: 1.0s; }
    .d11 { animation-delay: 1.1s; }
    .d12 { animation-delay: 1.2s; }
    .d13 { animation-delay: 1.3s; }
    .d14 { animation-delay: 1.4s; }

    .eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      font-weight: 300;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent-dim);
      margin-bottom: 1.2rem;
    }

    h1 {
      font-size: clamp(3.5rem, 8vw, 5.5rem);
      font-weight: 300;
      letter-spacing: -0.02em;
      line-height: 1.05;
      color: var(--text);
    }

    h1 span { font-style: italic; }

    .tagline {
      font-size: 1.1rem;
      color: #909090;
      margin-top: 1.2rem;
      font-weight: 300;
    }

    .divider {
      width: 100%;
      height: 1px;
      background: var(--border);
      margin: 3rem 0;
    }

    .btn-group {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-top: 2.5rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-decoration: none;
      padding: 0.75rem 1.6rem;
      transition: background 0.2s, color 0.2s;
    }

    .btn-primary {
      color: var(--bg);
      background: var(--accent);
    }
    .btn-primary:hover { background: var(--text); }

    .btn-secondary {
      color: var(--accent);
      background: transparent;
      border: 1px solid var(--border);
    }
    .btn-secondary:hover {
      border-color: var(--accent-dim);
      color: var(--text);
    }

    .btn-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent-dim);
      margin-top: 0.5rem;
      padding-left: 0.1rem;
    }

    .btn-wrapper {
      display: flex;
      flex-direction: column;
    }

    h2 {
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.2rem;
    }

    .legal-links {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .legal-links a {
      font-size: 1.05rem;
      color: #909090;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      transition: color 0.2s;
    }

    .legal-links a::before {
      content: '—';
      color: var(--accent-dim);
      font-size: 0.85rem;
    }

    .legal-links a:hover { color: var(--text); }

    .contact-link {
      color: #909090;
      text-decoration: none;
      transition: color 0.2s;
    }

    .contact-link:hover { color: var(--text); }

    footer {
      margin-top: 6rem;
      padding-top: 2rem;
      border-top: 1px solid var(--border);
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      color: var(--accent-dim);
      letter-spacing: 0.08em;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>
<body>
  <div class="wrap">
    <p class="eyebrow fade d1">Discord Bot</p>
    <h1 class="fade d2"><span>Zuki</span> ❤</h1>
    <p class="tagline fade d3">A cute, multi-purpose utility bot for Discord.</p>

    <div class="btn-group fade d4">
      <div class="btn-wrapper">
        <a class="btn btn-primary" href="https://discord.com/oauth2/authorize?client_id=1483258520546840678&permissions=101376&integration_type=0&scope=bot+applications.commands">+ Add to Server</a>
        <span class="btn-label">For a guild</span>
      </div>
      <div class="btn-wrapper">
        <a class="btn btn-secondary" href="https://discord.com/oauth2/authorize?client_id=1483258520546840678&integration_type=1&scope=applications.commands">+ Add to Account</a>
        <span class="btn-label">Use anywhere</span>
      </div>
    </div>

    <div class="divider fade d5"></div>

    <h2 class="fade d6">Legal</h2>
    <div class="legal-links fade d7">
      <a href="tos.html">Terms of Service</a>
      <a href="privacy.html">Privacy Policy</a>
    </div>

    <div class="divider fade d8"></div>

    <h2 class="fade d9">Bot Status</h2>
    <div class="legal-links fade d10">
      <a href="status.html">Status Page</a>
    </div>

    <div class="divider fade d11"></div>

    <h2 class="fade d12">Contact</h2>
    <p class="fade d13">Reach out on Discord —
      <a class="contact-link" href="https://discord.com/users/223472303000911873"><strong>zak.flac</strong></a>
    </p>

    <footer class="fade d14">© 2026 zak.flac — All rights reserved.</footer>
  </div>
</body>
</html>
